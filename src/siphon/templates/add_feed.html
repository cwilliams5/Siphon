{% extends "base.html" %}
{% block title_suffix %} - Add Feed{% endblock %}
{% block content %}
<h1>Add Feed</h1>

<div class="card">
  <form method="post" action="/ui/add">
    <div class="form-row">
      <div class="form-group" style="flex:2;">
        <label>Feed URL</label>
        <input type="text" name="url" placeholder="https://www.youtube.com/@Channel or https://podcast.com/rss" style="width:100%;" required
               value="{{ prefill.url or '' }}">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select name="type" id="feed-type">
          <option value="youtube" {% if prefill.type == 'youtube' %}selected{% endif %}>YouTube</option>
          <option value="podcast" {% if prefill.type == 'podcast' %}selected{% endif %}>Podcast</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Name (slug)</label>
        <input type="text" name="name" placeholder="my-channel (lowercase, dashes ok)" value="{{ prefill.name or '' }}" required>
      </div>
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" name="display_name" placeholder="Human-readable name" value="{{ prefill.display_name or '' }}">
      </div>
      <div class="form-group">
        <label>Mode</label>
        <select name="mode">
          <option value="" {% if not prefill.mode %}selected{% endif %}>Default</option>
          <option value="video" {% if prefill.mode == 'video' %}selected{% endif %}>Video</option>
          <option value="audio" {% if prefill.mode == 'audio' %}selected{% endif %}>Audio</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quality</label>
        <input type="text" name="quality" placeholder="1440 or max" value="{{ prefill.quality or '' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>SponsorBlock</label>
        <select name="sponsorblock">
          <option value="" {% if not prefill.sponsorblock %}selected{% endif %}>Default</option>
          <option value="true" {% if prefill.sponsorblock == 'true' %}selected{% endif %}>On</option>
          <option value="false" {% if prefill.sponsorblock == 'false' %}selected{% endif %}>Off</option>
        </select>
      </div>
      <div class="form-group">
        <label>SponsorBlock Categories</label>
        <input type="text" name="sponsorblock_categories" placeholder="sponsor, selfpromo, interaction" value="{{ prefill.sponsorblock_categories or '' }}">
      </div>
      <div class="form-group">
        <label>SponsorBlock Delay (min)</label>
        <input type="number" name="sponsorblock_delay_minutes" placeholder="Default: 4320 (3 days)" value="{{ prefill.sponsorblock_delay_minutes or '' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Block Shorts</label>
        <select name="block_shorts">
          <option value="" {% if not prefill.block_shorts %}selected{% endif %}>Default</option>
          <option value="true" {% if prefill.block_shorts == 'true' %}selected{% endif %}>On</option>
          <option value="false" {% if prefill.block_shorts == 'false' %}selected{% endif %}>Off</option>
        </select>
      </div>
      <div class="form-group">
        <label>Min Duration (sec)</label>
        <input type="number" name="min_duration_seconds" placeholder="Default: 60" value="{{ prefill.min_duration_seconds or '' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date Cutoff</label>
        <input type="text" name="date_cutoff" placeholder="YYYYMMDD" value="{{ prefill.date_cutoff or '' }}">
      </div>
      <div class="form-group">
        <label>LLM Trim</label>
        <select name="llm_trim">
          <option value="" {% if not prefill.llm_trim %}selected{% endif %}>Default</option>
          <option value="true" {% if prefill.llm_trim == 'true' %}selected{% endif %}>On</option>
          <option value="false" {% if prefill.llm_trim == 'false' %}selected{% endif %}>Off</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Title Exclude (comma-separated)</label>
      <input type="text" name="title_exclude" placeholder="live, #shorts, community" style="width:100%;" value="{{ prefill.title_exclude or '' }}">
    </div>
    <div class="form-group">
      <label>Claude Prompt Extra</label>
      <textarea name="claude_prompt_extra" rows="2" placeholder="Additional instructions for ad detection...">{{ prefill.claude_prompt_extra or '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Claude Prompt Override</label>
      <textarea name="claude_prompt_override" rows="2" placeholder="Complete replacement for the default ad detection prompt...">{{ prefill.claude_prompt_override or '' }}</textarea>
    </div>
    <button type="submit">Add Feed</button>
  </form>
</div>

<script>
(function() {
  var nameInput = document.querySelector('input[name="name"]');
  var displayInput = document.querySelector('input[name="display_name"]');
  var userEditedSlug = !!nameInput.value;

  nameInput.addEventListener('input', function() { userEditedSlug = true; });

  displayInput.addEventListener('input', function() {
    if (userEditedSlug) return;
    var slug = this.value.toLowerCase().trim()
      .replace(/[^\w\s-]/g, '')
      .replace(/[\s_]+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
    nameInput.value = slug;
  });
})();
</script>
{% endblock %}
