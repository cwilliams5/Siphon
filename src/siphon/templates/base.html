<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Siphon{% block title_suffix %}{% endblock %}</title>
  <link rel="icon" href="/ui/img/favicon.ico" type="image/x-icon">
  <style>
    :root, [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #0f3460;
      --text-primary: #e0e0e0;
      --text-secondary: #888;
      --text-muted: #666;
      --text-heading: #fff;
      --text-label: #aaa;
      --border: #333;
      --accent: #7c83ff;
      --accent-hover: #5a62d9;
      --badge-yt: #c0392b;
      --badge-pod: #2980b9;
      --badge-llm: #8e44ad;
      --btn-danger: #c0392b;
      --btn-danger-hover: #a93226;
      --btn-secondary: #444;
      --btn-secondary-hover: #555;
      --success: #27ae60;
      --warning: #f39c12;
      --error: #e74c3c;
      --flash-success: #1e8449;
      --flash-error: #c0392b;
      --flash-info: #2471a3;
      --nav-link-bg: #16213e;
      --nav-link-hover: #0f3460;
      --link-color: #7c83ff;
    }

    [data-theme="black"] {
      --bg-primary: #000000;
      --bg-card: #0a0a0a;
      --bg-input: #1a1a1a;
      --text-primary: #d0d0d0;
      --text-secondary: #777;
      --text-muted: #555;
      --text-heading: #ccc;
      --text-label: #999;
      --border: #222;
      --accent: #5599ff;
      --accent-hover: #3377dd;
      --badge-yt: #c0392b;
      --badge-pod: #2980b9;
      --badge-llm: #8e44ad;
      --btn-danger: #c0392b;
      --btn-danger-hover: #a93226;
      --btn-secondary: #333;
      --btn-secondary-hover: #444;
      --success: #27ae60;
      --warning: #f39c12;
      --error: #e74c3c;
      --flash-success: #1e8449;
      --flash-error: #c0392b;
      --flash-info: #2471a3;
      --nav-link-bg: #0a0a0a;
      --nav-link-hover: #1a1a1a;
      --link-color: #5599ff;
    }

    [data-theme="light"] {
      --bg-primary: #f5f5f5;
      --bg-card: #ffffff;
      --bg-input: #e8e8e8;
      --text-primary: #222;
      --text-secondary: #666;
      --text-muted: #999;
      --text-heading: #111;
      --text-label: #555;
      --border: #ddd;
      --accent: #4a5abb;
      --accent-hover: #3a4a9b;
      --badge-yt: #e74c3c;
      --badge-pod: #3498db;
      --badge-llm: #9b59b6;
      --btn-danger: #e74c3c;
      --btn-danger-hover: #c0392b;
      --btn-secondary: #ccc;
      --btn-secondary-hover: #bbb;
      --success: #27ae60;
      --warning: #f39c12;
      --error: #e74c3c;
      --flash-success: #27ae60;
      --flash-error: #e74c3c;
      --flash-info: #3498db;
      --nav-link-bg: #e8e8e8;
      --nav-link-hover: #ddd;
      --link-color: #4a5abb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg-primary); color: var(--text-primary); padding: 0 20px 140px; max-width: 1100px; margin: 0 auto; }
    a { color: var(--link-color); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.6em; margin-bottom: 16px; color: var(--text-heading); }
    h2 { font-size: 1.2em; margin-bottom: 12px; color: var(--text-secondary); }
    .nav { position: sticky; top: 0; z-index: 100; background: var(--bg-card);
           border-bottom: 1px solid var(--border);
           padding: 12px calc((100vw - 1100px) / 2 + 20px);
           width: 100vw; margin-left: calc(-50vw + 50%);
           display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
           margin-bottom: 24px; }
    .nav a { padding: 6px 14px; border-radius: 6px; background: var(--nav-link-bg); color: var(--link-color);
             display: inline-flex; align-items: center; gap: 4px; text-decoration: none; }
    .nav a:hover, .nav a.active { background: var(--nav-link-hover); text-decoration: none; }
    .nav-spacer { flex: 1; }
    .card { background: var(--bg-card); border-radius: 8px; padding: 16px; margin-bottom: 12px;
            border: 1px solid transparent; transition: border-color 0.15s; }
    .card:hover { border-color: var(--border); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    .badge-yt { background: var(--badge-yt); color: #fff; }
    .badge-pod { background: var(--badge-pod); color: #fff; }
    .badge-llm { background: var(--badge-llm); color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-label); font-weight: 500; font-size: 0.85em; text-transform: uppercase; }
    input, select, textarea { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--btn-secondary);
           border-radius: 4px; padding: 6px 10px; font-size: 0.95em; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; width: 100%; }
    button, .btn { background: var(--accent); color: #fff; border: none; border-radius: 6px;
           padding: 8px 18px; cursor: pointer; font-size: 0.95em; display: inline-flex; align-items: center; gap: 4px; }
    button:hover, .btn:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--btn-danger); }
    .btn-danger:hover { background: var(--btn-danger-hover); }
    .btn-secondary { background: var(--btn-secondary); }
    .btn-secondary:hover { background: var(--btn-secondary-hover); }
    .btn-small { padding: 4px 10px; font-size: 0.85em; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; color: var(--text-label); font-size: 0.9em; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 200px; }
    .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .flash-success { background: var(--flash-success); }
    .flash-error { background: var(--flash-error); }
    .flash-info { background: var(--flash-info); }
    .status-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { background: var(--bg-card); padding: 12px 20px; border-radius: 8px; text-align: center;
            position: relative; overflow: hidden;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            border: 1px solid transparent;
            flex: 1 1 0; min-width: 0; }
    .stat:hover { transform: translateY(-2px); border-color: var(--accent);
                  box-shadow: 0 4px 12px rgba(124, 131, 255, 0.25); }
    .stat-watermark {
      position: absolute;
      width: 14px !important;
      height: 14px !important;
      top: 6px;
      right: 6px;
      opacity: 0.4;
      color: var(--text-muted);
      pointer-events: none;
      z-index: 0;
    }
    .stat-value { font-size: 1.4em; font-weight: bold; color: var(--text-heading); position: relative; z-index: 1;
                  font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 0.8em; color: var(--text-secondary); margin-top: 2px; position: relative; z-index: 1; }
    .hidden { display: none; }
    .btn-filter-active { background: var(--accent) !important; color: #fff !important; }
    .btn-filter-exclude { background: var(--btn-danger) !important; color: #fff !important; }

    /* Insight cards */
    .insight-card {
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .insight-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 131, 255, 0.25);
    }
    .insight-title {
      color: var(--text-label);
      font-size: 0.85em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    .insight-entry {
      font-size: 0.85em;
      padding: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Theme dropdown */
    .theme-dropdown { position: relative; }
    .theme-btn { padding: 4px 8px; font-size: 0.85em; border-radius: 4px;
                 background: var(--btn-secondary); color: var(--text-primary); border: none; cursor: pointer;
                 line-height: 1; display: flex; align-items: center; }
    .theme-btn:hover { background: var(--btn-secondary-hover); }
    .theme-menu {
      position: absolute; top: 100%; right: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px; z-index: 200; min-width: 120px;
    }
    .theme-option {
      display: block; width: 100%; text-align: left;
      padding: 6px 12px; background: none; border: none;
      color: var(--text-primary); cursor: pointer; border-radius: 4px; font-size: 0.9em;
    }
    .theme-option:hover { background: var(--btn-secondary); }

    /* Search input in nav */
    .nav-search { padding: 4px 10px; font-size: 0.85em; border-radius: 4px;
                  background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border);
                  width: 180px; }
    .nav-search:focus { outline: none; border-color: var(--accent); }

    /* Feed card layout */
    .feed-card {
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      border: 1px solid transparent;
      background: var(--bg-card);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.12) 100%);
    }
    .feed-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(124, 131, 255, 0.2);
    }

    .feed-card-layout {
      display: flex;
      gap: 16px;
    }

    .feed-artwork {
      flex-shrink: 0;
      width: 70px;
      align-self: center;
    }
    .feed-artwork img {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      object-fit: cover;
    }
    .feed-artwork-placeholder {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
    }

    .feed-content {
      flex: 1;
      min-width: 0;
    }

    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 8px;
    }

    .feed-title-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .feed-slug {
      color: var(--text-secondary);
      font-size: 0.85em;
    }

    .feed-buttons {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .feed-meta {
      font-size: 0.8em;
      color: var(--text-secondary);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .feed-meta:hover {
      white-space: normal;
      overflow: visible;
    }

    .feed-error {
      color: var(--error);
    }

    /* Stat chips */
    .feed-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .stat-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      background: var(--bg-input);
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* Queue indicator */
    .feed-queue {
      font-size: 0.85em;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .queue-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warning);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Activity footer */
    .activity-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-card); border-top: 1px solid var(--border);
      z-index: 100; transition: height 0.3s;
    }
    .activity-collapsed { height: 120px; }
    .activity-expanded { height: 50vh; }
    .activity-header {
      display: flex; justify-content: space-between;
      padding: 6px 12px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-weight: bold; color: var(--accent);
    }
    .activity-body {
      overflow-y: auto; height: calc(100% - 32px);
      padding: 4px 12px; font-family: monospace; font-size: 0.85em;
    }
    .activity-body .log-entry { margin: 1px 0; }
    .activity-body .error { color: var(--error); }
    .activity-body .warning { color: var(--warning); }
    .activity-body .info { color: var(--text-secondary); }
    .activity-status-bar {
      padding: 4px 0; border-bottom: 1px solid var(--border);
      margin-bottom: 4px; font-size: 0.9em; color: var(--text-secondary);
    }
    .activity-status-bar span { margin-right: 12px; white-space: nowrap; }

    /* Feed card entrance animation */
    .feed-card { opacity: 0; transform: translateY(12px); animation: cardIn 0.3s ease-out forwards; }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    /* Disk progress bar */
    .disk-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
    .disk-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease-out; }

    /* Stat accent stripes */
    .stat-system { border-left: 3px solid var(--accent); }
    .stat-lifetime { border-left: 3px solid var(--badge-llm); }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <div class="nav">
    <img src="/ui/img/header-logo.png" alt="Siphon" style="height:28px; margin-right:8px;" onerror="this.style.display='none'">
    <a href="/ui/" hx-get="/ui/" hx-target="#main-content" hx-push-url="true" class="{% if active_page == 'stats' %}active{% endif %}" title="Dashboard stats and insights"><i data-lucide="bar-chart-2" style="width:16px;height:16px;"></i> Stats</a>
    <a href="/ui/feeds" hx-get="/ui/feeds" hx-target="#main-content" hx-push-url="true" class="{% if active_page == 'feeds' %}active{% endif %}" title="View and manage feeds"><i data-lucide="rss" style="width:16px;height:16px;"></i> Feeds</a>
    <a href="/ui/add" hx-get="/ui/add" hx-target="#main-content" hx-push-url="true" class="{% if active_page == 'add' %}active{% endif %}" title="Add a new feed"><i data-lucide="plus-circle" style="width:16px;height:16px;"></i> Add Feed</a>
    <a href="/ui/import" hx-get="/ui/import" hx-target="#main-content" hx-push-url="true" class="{% if active_page == 'import' %}active{% endif %}" title="Import feeds from OPML file"><i data-lucide="upload" style="width:16px;height:16px;"></i> OPML Import</a>
    <div class="nav-spacer"></div>
    <div style="position:relative; display:inline-flex; align-items:center;">
      <i data-lucide="search" style="width:14px;height:14px; position:absolute; left:8px; color:var(--text-muted); pointer-events:none;"></i>
      <input type="text" id="feed-search" class="nav-search" placeholder="Search feeds..." title="Search feeds by name" style="padding-left:28px;"
             oninput="siphonSearch()" onkeydown="if(event.key==='Escape'){this.value='';siphonSearch();}">
    </div>
    <button class="btn btn-small" title="Check all feeds for new episodes"
            hx-post="/ui/check-now" hx-swap="none">
      <i data-lucide="refresh-cw" style="width:14px;height:14px;"></i> Check Now
    </button>
    <div class="theme-dropdown">
      <button class="theme-btn" onclick="toggleThemeMenu()" title="Change theme">
        <i data-lucide="palette" style="width:16px;height:16px;"></i>
      </button>
      <div id="theme-menu" class="theme-menu hidden">
        <button onclick="setTheme('light')" class="theme-option">&#9728;&#65039; Light</button>
        <button onclick="setTheme('dark')" class="theme-option">&#127769; Dark</button>
        <button onclick="setTheme('black')" class="theme-option">&#11035; Black</button>
      </div>
    </div>
  </div>

  <div id="main-content" style="padding-top: 20px;">
  {% for msg in messages %}
  <div class="flash flash-{{ msg.type }}">{{ msg.text }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
  </div>

  <!-- Activity footer (persistent across pages) -->
  <div id="activity-footer" class="activity-footer activity-collapsed">
    <div class="activity-header" onclick="toggleActivityLog()">
      <span id="activity-status">Loading...</span>
      <span id="activity-toggle">&#9650; Expand</span>
    </div>
    <div id="activity-body" class="activity-body">
      <div id="activity-status-bar" class="activity-status-bar"></div>
      <div id="activity-entries"></div>
    </div>
  </div>

  <script>
    /* Search — client-side on feeds page, navigates to feeds from other pages */
    var _searchTimer = null;
    function siphonSearch() {
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(function() {
        var q = document.getElementById('feed-search').value.toLowerCase();
        var feedList = document.getElementById('feed-list');
        if (feedList) {
          /* Already on feeds page — filter client-side */
          feedList.querySelectorAll('.card').forEach(function(card) {
            card.style.display = (!q || card.dataset.feedName.includes(q)) ? '' : 'none';
          });
        } else {
          /* On another page — navigate to feeds */
          var url = '/ui/feeds' + (q ? '?q=' + encodeURIComponent(q) : '');
          htmx.ajax('GET', url, {target: '#main-content', swap: 'innerHTML'}).then(function() {
            history.pushState({}, '', url);
            /* Update nav active state */
            document.querySelectorAll('.nav a[hx-get]').forEach(function(a) {
              a.classList.toggle('active', a.getAttribute('hx-get') === '/ui/feeds');
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
          });
        }
      }, 150);
    }

    /* Theme management */
    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem('siphon-theme', theme);
      document.getElementById('theme-menu').classList.add('hidden');
    }
    function toggleThemeMenu() {
      document.getElementById('theme-menu').classList.toggle('hidden');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.theme-dropdown')) {
        document.getElementById('theme-menu').classList.add('hidden');
      }
    });
    (function() {
      const saved = localStorage.getItem('siphon-theme');
      if (saved) document.documentElement.dataset.theme = saved;
    })();

    /* Activity log (persistent) */
    var activityExpanded = localStorage.getItem('siphon-activity-expanded') === 'true';

    function toggleActivityLog() {
      activityExpanded = !activityExpanded;
      var footer = document.getElementById('activity-footer');
      footer.classList.toggle('activity-collapsed', !activityExpanded);
      footer.classList.toggle('activity-expanded', activityExpanded);
      document.getElementById('activity-toggle').innerHTML = activityExpanded ? '&#9660; Collapse' : '&#9650; Expand';
      localStorage.setItem('siphon-activity-expanded', activityExpanded);
    }

    (function() {
      var footer = document.getElementById('activity-footer');
      if (activityExpanded) {
        footer.classList.remove('activity-collapsed');
        footer.classList.add('activity-expanded');
        document.getElementById('activity-toggle').innerHTML = '&#9660; Collapse';
      }
    })();

    function fetchActivityLog() {
      fetch('/ui/activity-log-data')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('activity-status').textContent = data.status || 'Idle';
          var sys = data.system || {};
          var barHtml = '';
          if (sys.pause_state && sys.pause_state !== 'running') {
            barHtml += '<span style="color:var(--warning);">[' + sys.pause_state.replace('_', ' ') + ']</span>';
          }
          barHtml += '<span>Limits: YT ' + (sys.youtube_downloads_this_hour||0) + '/' + (sys.youtube_downloads_max||0) + '/hr';
          barHtml += ' | Pod ' + (sys.podcast_downloads_this_hour||0) + '/' + (sys.podcast_downloads_max||0) + '/hr</span>';
          barHtml += '<span>Queued: DL ' + (sys.dl_queue||0) + ' | Whisper ' + (sys.whisper_queue||0) + ' | Claude ' + (sys.claude_queue||0) + '</span>';
          barHtml += '<span>Active: DL ' + (sys.active_dl||0) + ' | Whisper ' + (sys.active_whisper||0) + ' | Claude ' + (sys.active_claude||0) + '</span>';
          document.getElementById('activity-status-bar').innerHTML = barHtml;
          var entries = data.entries || [];
          var maxEntries = activityExpanded ? entries.length : 5;
          var html = '';
          for (var i = 0; i < Math.min(entries.length, maxEntries); i++) {
            var e = entries[i];
            var cls = e.level || 'info';
            var feed = e.feed ? '[' + e.feed + '] ' : '';
            html += '<div class="log-entry ' + cls + '">' + e.time + ' ' + feed + e.message + '</div>';
          }
          if (!entries.length) {
            html = '<div style="color:var(--text-muted);">No activity yet. Hit "Check Now" to start.</div>';
          }
          document.getElementById('activity-entries').innerHTML = html;
        })
        .catch(function() {});
    }

    fetchActivityLog();
    setInterval(fetchActivityLog, 5000);

    /* Update nav active state and re-init after htmx swaps */
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      /* Re-render Lucide icons on any swap (cards, pages) */
      if (typeof lucide !== 'undefined') lucide.createIcons();
      if (evt.detail.target.id === 'main-content') {
        /* Update nav active state from URL */
        var path = window.location.pathname;
        document.querySelectorAll('.nav a[hx-get]').forEach(function(a) {
          var href = a.getAttribute('hx-get');
          a.classList.toggle('active', path === href || (href === '/ui/' && path === '/ui'));
        });
        /* Re-run count-up animations */
        if (typeof runCountUp === 'function') runCountUp();
      }
    });

    /* Count-up animation for stat values */
    function runCountUp() {
      document.querySelectorAll('.stat-value').forEach(function(el) {
        if (el.dataset.counted) return;
        var text = el.textContent.trim();
        var match = text.match(/^([\d,]+(?:\.\d+)?)/);
        if (!match) return;
        var raw = match[1].replace(/,/g, '');
        var target = parseFloat(raw);
        if (isNaN(target) || target === 0) return;
        el.dataset.counted = '1';
        var suffix = text.slice(match[0].length);
        var hasCommas = match[1].includes(',');
        var decimals = match[1].includes('.') ? match[1].split('.')[1].length : 0;
        var duration = 800;
        var start = performance.now();
        function step(now) {
          var t = Math.min((now - start) / duration, 1);
          t = 1 - Math.pow(1 - t, 3);
          var val = target * t;
          var display = decimals ? val.toFixed(decimals) : Math.round(val).toString();
          if (hasCommas) display = parseInt(display).toLocaleString() + (decimals ? '.' + val.toFixed(decimals).split('.')[1] : '');
          el.textContent = display + suffix;
          if (t < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    }
    runCountUp();
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
