<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Siphon{% block title_suffix %}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 1100px; margin: 0 auto; }
    a { color: #7c83ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.6em; margin-bottom: 16px; color: #fff; }
    h2 { font-size: 1.2em; margin-bottom: 12px; color: #ccc; }
    .nav { display: flex; gap: 16px; margin-bottom: 24px; padding: 12px 0; border-bottom: 1px solid #333; }
    .nav a { padding: 6px 14px; border-radius: 6px; background: #16213e; }
    .nav a:hover, .nav a.active { background: #0f3460; text-decoration: none; }
    .card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    .badge-yt { background: #c0392b; color: #fff; }
    .badge-pod { background: #2980b9; color: #fff; }
    .badge-llm { background: #8e44ad; color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #333; }
    th { color: #aaa; font-weight: 500; font-size: 0.85em; text-transform: uppercase; }
    input, select, textarea { background: #0f3460; color: #e0e0e0; border: 1px solid #444;
           border-radius: 4px; padding: 6px 10px; font-size: 0.95em; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #7c83ff; }
    textarea { resize: vertical; width: 100%; }
    button, .btn { background: #7c83ff; color: #fff; border: none; border-radius: 6px;
           padding: 8px 18px; cursor: pointer; font-size: 0.95em; display: inline-block; }
    button:hover, .btn:hover { background: #5a62d9; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #a93226; }
    .btn-secondary { background: #444; }
    .btn-secondary:hover { background: #555; }
    .btn-small { padding: 4px 10px; font-size: 0.85em; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; color: #aaa; font-size: 0.9em; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 200px; }
    .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .flash-success { background: #1e8449; }
    .flash-error { background: #c0392b; }
    .flash-info { background: #2471a3; }
    .status-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { background: #16213e; padding: 12px 20px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.4em; font-weight: bold; color: #fff; }
    .stat-label { font-size: 0.8em; color: #888; margin-top: 2px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/ui/" class="{% if active_page == 'feeds' %}active{% endif %}">Feeds</a>
    <a href="/ui/add" class="{% if active_page == 'add' %}active{% endif %}">Add Feed</a>
    <a href="/ui/import" class="{% if active_page == 'import' %}active{% endif %}">OPML Import</a>
  </div>
  {% for msg in messages %}
  <div class="flash flash-{{ msg.type }}">{{ msg.text }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</body>
</html>
